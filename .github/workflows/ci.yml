name: API Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone and start Spring Boot API
        run: |
          git clone https://github.com/kaushikuk10-cpu/taskmanager.git
          cd taskmanager
          chmod +x mvnw
          ./mvnw spring-boot:run &

      - name: Wait for Spring Boot to be ready
        run: |
          echo "Waiting for API to start..."
          for i in {1..24}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/api/auth/register \
              -H "Content-Type: application/json" \
              -d '{"username":"healthcheck'$i'","password":"check123"}')
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ] || [ "$STATUS" = "403" ]; then
              echo "API is ready!"
              break
            fi
            sleep 5
          done

      - name: Run tests
        run: pytest tests/ --alluredir=allure-results -v
        env:
          BASE_URL: http://localhost:8080

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7