name: API Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Clone Spring Boot app
        run: git clone https://github.com/kaushikuk10-cpu/taskmanager.git /home/runner/taskmanager

      - name: Start Spring Boot app in background
        working-directory: /home/runner/taskmanager
        run: |
          chmod +x mvnw
          nohup ./mvnw spring-boot:run > /tmp/springboot.log 2>&1 &
          echo "Spring Boot launching in background..."

      - name: Wait for API to be ready
        run: |
          echo "Giving Maven time to download dependencies..."
          sleep 60
          echo "Now polling API..."
          for i in {1..20}; do
            echo "Attempt $i..."
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              -X POST http://localhost:8080/api/auth/register \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"ci_health_$i\",\"password\":\"pass123\"}" || echo "000")
            echo "HTTP: $HTTP"
            if [[ "$HTTP" == "200" || "$HTTP" == "400" || "$HTTP" == "403" ]]; then
              echo "API is up!"
              exit 0
            fi
            sleep 10
          done
          echo "=== Spring Boot logs ==="
          cat /tmp/springboot.log
          exit 1

      - name: Run pytest
        run: pytest tests/ --alluredir=allure-results -v
        env:
          BASE_URL: http://localhost:8080

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7